type Boardgame @aws_cognito_user_pools @aws_iam {
  id: ID!
  owner: User!
  name: String!
  imageUrl: String!
}

type BoardgameInfo {
  name: String!
  image_url: String
  thumb_url: String
  url: String
  min_players: Int
  max_players: Int
  min_playtime: Int
  max_playtime: Int
  min_age: Int
}

type PushSubscription @aws_cognito_user_pools @aws_iam {
  endpoint: ID!
  owner: User!
}

type Seat @aws_cognito_user_pools @aws_iam {
  id: ID!
  owner: User
}

type News @aws_cognito_user_pools @aws_iam {
  id: ID!
  author: User!
  title: String!
  article: String!
  datetime: AWSDateTime!
  likes: Int
  comments: [Comment]
}

type Comment @aws_cognito_user_pools @aws_iam {
  id: ID!
  author: User!
  text: String!
  datetime: AWSDateTime!
}

type Query {
  user: User
  getNews: [News] @aws_cognito_user_pools @aws_iam
  getBoardgames: [Boardgame] @aws_cognito_user_pools @aws_iam
  getSeats: [Seat] @aws_cognito_user_pools @aws_iam
  searchBoardgames(name: String!, limit: Int, skip: Int): [BoardgameInfo]
}

type User @aws_cognito_user_pools @aws_iam {
  id: ID!
  name: String!
  preferred_username: String
  picture: String
}

input AddBoardgameInput {
  name: String!
  imageUrl: String!
}

input PushSubscriptionInput {
  endpoint: ID!
  keys: PushSubscriptionKeysInput!
}

input PushSubscriptionKeysInput {
  auth: String!
  p256dh: String!
}

input NewsInput {
  title: String!
  article: String!
}

type Mutation {
  addBoardgame(boardgame: AddBoardgameInput!): Boardgame
  removeBoardgame(id: ID!): Boardgame
  addPushSubscription(subscription: PushSubscriptionInput!): PushSubscription
    @aws_cognito_user_pools
    @aws_iam
  removePushSubscription(endpoint: ID!): PushSubscription
    @aws_cognito_user_pools
    @aws_iam
  takeSeat(seatId: ID!): Seat
  giveUpSeat(seatId: ID!): Seat
  writeNews(news: NewsInput!): News!
    @aws_cognito_user_pools(cognito_groups: ["NewsEditors"])
}
