packageExtensions:
  '@ant-design/icons@*':
    peerDependencies:
      react-dom: 15.0.0 || ^16.0.0
  semantic-ui-react@*:
    peerDependenciesMeta:
      '@types/react':
        optional: true
  antd@*:
    peerDependencies:
      dayjs: ^1.8.18
    peerDependenciesMeta:
      dayjs:
        optional: true
      '@types/react':
        optional: true
  mini-store@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
  rc-animate@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-cascader@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-checkbox@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
  rc-collapse@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-dialog@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-drawer@*:
    peerDependencies:
      react-dom: 15.0.0 || ^16.0.0
  rc-field-form@*:
    peerDependencies:
      react-dom: 15.0.0 || ^16.0.0
  rc-input-number@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-mentions@*:
    peerDependencies:
      react-dom: 15.0.0 || ^16.0.0
  rc-menu@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-progress@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
  rc-rate@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-slider@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-tabs@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-tooltip@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-trigger@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  rc-upload@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
  rc-util@*:
    peerDependencies:
      react: 15.0.0 || ^16.0.0
      react-dom: 15.0.0 || ^16.0.0
  react-scripts@*:
    dependencies:
      ts-pnp: ^1.2.0
  '@aws-sdk/fetch-http-handler@*':
    dependencies:
      '@aws-sdk/util-base64-browser': 'latest'

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-typescript.cjs
    spec: '@yarnpkg/plugin-typescript'
  - path: .yarn/plugins/@yarnpkg/plugin-workspace-tools.cjs
    spec: '@yarnpkg/plugin-workspace-tools'
  - path: .yarn/plugins/@yarnpkg/plugin-interactive-tools.cjs
    spec: '@yarnpkg/plugin-interactive-tools'
  - path: .yarn/plugins/@yarnpkg/plugin-constraints.cjs
    spec: '@yarnpkg/plugin-constraints'

yarnPath: .yarn/releases/yarn-2.0.0-rc.36.cjs
